<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00695C" />
      <stop offset="100%" stop-color="#004D40" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00C853" />
      <stop offset="100%" stop-color="#00E676" />
    </linearGradient>
  </defs>

  <!-- Dukan Sathi Geometric Monogram -->
  <rect x="10" y="15" width="45" height="45" rx="12" fill="url(#grad1)" />
  <rect x="25" y="25" width="45" height="45" rx="12" fill="url(#grad2)" opacity="0.9" />
  
  <text x="47" y="57" font-family="system-ui, -apple-system, sans-serif" font-size="30" font-weight="900" fill="#FFFFFF" text-anchor="middle" style="text-shadow: 0px 2px 4px rgba(0,0,0,0.2);">DS</text>
  
  <!-- Text Label -->
  <text x="90" y="55" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="800" fill="#004D40" letter-spacing="-1">Dukan Sathi</text>
</svg>
