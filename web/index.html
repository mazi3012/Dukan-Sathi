  <style>
    #loading-splash {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #0F111A;
      display: flex;

      overflow: hidden;
      transition: opacity 0.5s ease-out;

    #loading-splash .glow {
      position: absolute;
      width: 450px;
      height: 450px;
      background: radial-gradient(circle, rgba(5, 150, 105, 0.15) 0%, rgba(5, 150, 105, 0) 70%);

    #loading-splash .progress-bar {

      border-radius: 2px;
      overflow: hidden;
      animation: fade-slide-in 0.8s ease-out 0.8s both;
    }
    #loading-splash .progress-inner {
      width: 40%;
      height: 100%;
      background-color: #059669;
      border-radius: 2px;
      animation: loading-pulse 2s infinite ease-in-out;
    }
    @keyframes logo-pop {
      from { transform: scale(0.4) rotate(-15deg); opacity: 0; }
      to { transform: scale(1) rotate(0); opacity: 1; }
    }
    @keyframes logo-shimmer {
      0% { filter: brightness(1); }
      50% { filter: brightness(1.2) drop-shadow(0 0 12px rgba(5, 150, 105, 0.5)); }

    }
    @keyframes fade-slide-in {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes loading-pulse {
      0% { transform: translateX(-100%); width: 30%; }
      50% { width: 60%; }
      100% { transform: translateX(330%); width: 30%; }
    }

<body>
  <!-- Startup Splash Screen -->
  <div id="loading-splash">
    <div class="glow"></div>
    <div class="splash-content">
      <div class="logo-wrapper">
        <img src="favicon.png" alt="Dukan Sathi Logo" class="logo">

      <div class="progress-bar">
        <div class="progress-inner"></div>
      </div>
    </div>
  </div>

  <script>
    window.addEventListener('load', function() {
      // Create MutationObserver to detect when Flutter mounts <flutter-view>
      var observer = new MutationObserver(function(mutations) {
        for (var i = 0; i < mutations.length; i++) {
          var addedNodes = mutations[i].addedNodes;
          for (var j = 0; j < addedNodes.length; j++) {
            var node = addedNodes[j];
            if (node.nodeName === 'FLUTTER-VIEW' || node.tagName === 'FLUTTER-VIEW') {
              dismissSplash();
              observer.disconnect();
              return;
            }
          }
        }
      });
      observer.observe(document.body, { childList: true });

      function dismissSplash() {
        var splash = document.getElementById('loading-splash');
        if (splash) {
          splash.style.opacity = '0';
          setTimeout(function() {
            if (splash.parentNode) {
              splash.parentNode.removeChild(splash);
            }
          }, 500);
        }
      }

      // Safety timeout: dismiss splash after 7.5 seconds in case of loading issues
      setTimeout(dismissSplash, 7500);
    });
  </script>
