services:
  - type: web
    name: dukan-sathi-pro
    env: docker
    plan: free
    dockerCommand: /app/server/bin/server
    region: singapore
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: MODEL_ID
        value: llama-3.3-70b-versatile
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: PORT
        value: "3100"
    autoDeploy: true
