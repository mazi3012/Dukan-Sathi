services:
  - type: web
    name: dukan-sathi-pro
    env: docker
    plan: free
    dockerCommand: /app/server/bin/server
    region: singapore # Change as needed
    envVars:
      - key: SUPABASE_URL
        sync: true
      - key: SUPABASE_ANON_KEY
        sync: true
      - key: TELEGRAM_BOT_TOKEN
        sync: true
      - key: GROQ_API_KEY
        sync: true
        value: your-groq-api-key-here
      - key: MODEL_ID
        sync: true
        value: llama-3.3-70b-versatile
    autoDeploy: true
