  sqflite: ^2.3.0
  path_provider: ^2.1.1
  connectivity_plus: ^6.0.3
  path: ^1.9.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^6.0.0
  sqflite_common_ffi: ^2.3.0
  build_runner: ^2.4.0
  freezed: ^2.4.0
