name: dukansathi_new
description: AI-Powered Shop Companion with cutting-edge Glassmorphism UI.
publish_to: none

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.10
  google_fonts: ^6.1.0
  flutter_animate: ^4.5.0
  flutter_riverpod: ^2.4.9
  iconsax: ^0.0.8
  font_awesome_flutter: ^11.0.0
  pdf: ^3.11.3
