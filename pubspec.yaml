  json_annotation: ^4.9.0
  freezed_annotation: ^2.4.4
  supabase: ^2.10.6
  supabase_flutter: ^2.10.6
  google_sign_in: ^6.1.6
  dotenv: ^4.2.0
  uuid: ^4.5.3
  http: ^1.6.0
  shared_preferences: ^2.3.3
  record: ^5.1.0
  http_parser: ^4.0.0
  mime: ^1.0.5
